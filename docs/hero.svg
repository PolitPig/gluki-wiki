<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360">
  <title>Gluki Wiki — Farming &amp; Chemistry Guide</title>
  <desc>Official wiki for the Gluki Minecraft plugin</desc>
  
  <!-- Definitions -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070909" />
      <stop offset="100%" stop-color="#0f1213" />
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Gold Accent -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fab005" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#14191a" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />
  
  <!-- Grid overlay -->
  <rect width="100%" height="100%" fill="url(#grid)" opacity="0.8" />
  
  <!-- Decorative Stripes -->
  <path d="M -100 120 L 1400 -80" stroke="url(#accentGrad)" stroke-width="4" opacity="0.3" stroke-dasharray="10 15" />
  <path d="M -100 280 L 1400 80" stroke="url(#goldGrad)" stroke-width="2" opacity="0.2" stroke-dasharray="5 10" />

  <!-- Abstract Graphic Element (Leaf / Alchemy) -->
  <g transform="translate(1000, 180) scale(4.5)" opacity="0.85">
    <!-- Outer rings -->
    <circle cx="0" cy="0" r="30" fill="none" stroke="#14191a" stroke-width="1.5" />
    <circle cx="0" cy="0" r="25" fill="none" stroke="#10b981" stroke-width="1" opacity="0.3" stroke-dasharray="2 3" />
    
    <!-- Leaf Path inside -->
    <path d="M0,-22 C-10,-10 -15,0 0,22 C15,0 10,-10 0,-22 Z" fill="none" stroke="url(#accentGrad)" stroke-width="2" />
    <path d="M-15,-8 C-5,-5 0,0 -8,12 C-15,6 -12,0 -15,-8 Z" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.7" />
    <path d="M15,-8 C5,-5 0,0 8,12 C15,6 12,0 15,-8 Z" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.7" />
    
    <!-- Core dot -->
    <circle cx="0" cy="0" r="3" fill="#fab005" />
  </g>

  <!-- Typography Block -->
  <g transform="translate(80, 110)">
    <!-- Version Chip -->
    <g transform="translate(0, 0)">
      <rect width="75" height="24" rx="12" fill="#14191a" stroke="#1a2223" stroke-width="1" />
      <text x="37.5" y="16" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8a9090" font-weight="500" text-anchor="middle">v 1.2.0</text>
    </g>
    
    <!-- Title -->
    <text x="0" y="85" font-family="'Instrument Serif', Georgia, serif" font-size="82" font-weight="400" fill="#ffffff" letter-spacing="-1">Gluki Wiki</text>
    <text x="365" y="85" font-family="'Instrument Serif', Georgia, serif" font-size="82" font-weight="400" font-style="italic" fill="#10b981" letter-spacing="-1">Book</text>
    
    <!-- Underline decoration -->
    <rect x="0" y="110" width="455" height="3" fill="url(#accentGrad)" />
    <rect x="465" y="110" width="15" height="3" fill="#fab005" />
    
    <!-- Subtitle / Meta description -->
    <text x="0" y="150" font-family="'Plus Jakarta Sans', sans-serif" font-size="16" font-weight="500" fill="#8a9090" letter-spacing="1">FARMING &amp; CHEMISTRY GAMEPLAY GUIDE</text>
  </g>
  
  <!-- Bottom bar categories -->
  <g transform="translate(80, 310)" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="500" fill="#555d5d" letter-spacing="2">
    <text x="0" y="0">FARMING</text>
    <circle cx="95" cy="-4" r="3" fill="#10b981" opacity="0.5" />
    <text x="120" y="0">CHEMISTRY</text>
    <circle cx="235" cy="-4" r="3" fill="#10b981" opacity="0.5" />
    <text x="260" y="0">PURITY SYSTEM</text>
    <circle cx="400" cy="-4" r="3" fill="#10b981" opacity="0.5" />
    <text x="425" y="0">HALLUCINATIONS</text>
  </g>
</svg>
